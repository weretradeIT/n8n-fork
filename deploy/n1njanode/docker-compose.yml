# n8n Workflow Automation - HARDENED
# Risk: 8/10 → 2/10 after hardening
# Hardened: 2026-01-31

networks:
  app_net:
    external: true
  database_net:
    external: true
  llm-shared-net:
    external: true

volumes:
  n8n_data:

services:
  n8n:
    image: ghcr.io/lair404xyz/n8n:oidc-unlocked  # OIDC-unlocked fork (v2.9.0)
    container_name: n8n
    restart: always
    init: true
    ports:
      - "127.0.0.1:5678:5678"  # Localhost only
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - NODES_EXCLUDE=
      - NODES_INCLUDE=
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_HOST=n8n.n1njanode.com
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - WEBHOOK_URL=https://n8n.n1njanode.com
      - GENERIC_TIMEZONE=Europe/Berlin
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres-primary
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n_user
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      - N8N_TRUST_PROXY=true
      - NODE_FUNCTION_ALLOW_BUILTIN=*
      - NODE_ENV=production
      - N8N_PUBLIC_API_DISABLED=false
      - N8N_SSO_OIDC_LOGIN_ENABLED=true
      - N8N_SSO_REDIRECT_LOGIN_TO_SSO=true
      - N8N_SSO_JUST_IN_TIME_PROVISIONING=true
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - app_net
      - database_net
      - llm-shared-net
    # HARDENING ADDED BELOW
    deploy:
      resources:
        limits:
          cpus: "2.0"      # Prevent CPU exhaustion
          memory: 2G        # Prevent memory exhaustion
          pids: 200           # Prevent fork bombs
    read_only: true         # Read-only filesystem
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m,uid=1000,gid=1000           # Temp files
      - /home/node/.cache:rw,noexec,nosuid,size=200m,uid=1000,gid=1000  # Node cache
      - /home/node/.npm:rw,noexec,nosuid,size=100m,uid=1000,gid=1000    # NPM cache
    security_opt:
      - no-new-privileges:true  # Prevent privilege escalation
    cap_drop:
      - ALL                 # Drop all capabilities
    cap_add:
      - CHOWN               # Needed for file ownership
      - SETGID              # Needed for group management
      - SETUID              # Needed for user management
      - DAC_OVERRIDE        # Needed for file access